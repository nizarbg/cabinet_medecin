<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/main}">
<head><title>Détail Médecin</title></head>
<body>
<div layout:fragment="content">
    <div class="d-flex align-items-center gap-2 mb-4">
        <a th:href="@{/medecins}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i></a>
        <h2 class="fw-bold mb-0" th:text="${'Dr. ' + medecin.prenom + ' ' + medecin.nom}"></h2>
        <a sec:authorize="hasRole('ADMIN')"
           th:href="@{/medecins/{id}/modifier(id=${medecin.id})}" class="ms-auto btn btn-warning btn-sm">
            <i class="bi bi-pencil me-1"></i>Modifier
        </a>
    </div>

    <div class="card border-0 shadow-sm" style="max-width: 600px;">
        <div class="card-body">
            <dl class="row">
                <dt class="col-sm-4 text-muted">Spécialité</dt>
                <dd class="col-sm-8"><span class="badge bg-info text-dark" th:text="${medecin.specialite}"></span></dd>

                <dt class="col-sm-4 text-muted">Numéro d'ordre</dt>
                <dd class="col-sm-8" th:text="${medecin.numeroOrdre}"></dd>

                <dt class="col-sm-4 text-muted">Téléphone</dt>
                <dd class="col-sm-8" th:text="${medecin.telephone ?: '—'}"></dd>

                <dt class="col-sm-4 text-muted">Email</dt>
                <dd class="col-sm-8" th:text="${medecin.email ?: '—'}"></dd>

                <dt class="col-sm-4 text-muted">Horaires</dt>
                <dd class="col-sm-8" th:text="${medecin.horairesDisponibilite ?: '—'}"></dd>

                <dt class="col-sm-4 text-muted">Statut</dt>
                <dd class="col-sm-8">
                    <span th:if="${medecin.actif}" class="badge bg-success">Actif</span>
                    <span th:unless="${medecin.actif}" class="badge bg-danger">Inactif</span>
                </dd>
            </dl>
            <div class="mt-3">
                <a th:href="@{/rendez-vous/nouveau(medecinId=${medecin.id})}" class="btn btn-primary btn-sm">
                    <i class="bi bi-plus me-1"></i>Nouveau RDV pour ce médecin
                </a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
