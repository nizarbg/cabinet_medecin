<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head><title>Tableau de bord</title></head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold"><i class="bi bi-speedometer2 me-2 text-primary"></i>Tableau de bord</h2>
        <span class="text-muted" th:text="${#temporals.format(today, 'EEEE dd MMMM yyyy', #locale)}"></span>
    </div>

    <!-- KPI Cards -->
    <div class="row g-4 mb-4">
        <div class="col-md-4">
            <div class="card border-0 shadow-sm">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="rounded-circle bg-primary bg-opacity-10 p-3">
                        <i class="bi bi-calendar-day fs-3 text-primary"></i>
                    </div>
                    <div>
                        <div class="fs-2 fw-bold text-primary" th:text="${countJour}">0</div>
                        <div class="text-muted small">RDV aujourd'hui</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 shadow-sm">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="rounded-circle bg-success bg-opacity-10 p-3">
                        <i class="bi bi-calendar-week fs-3 text-success"></i>
                    </div>
                    <div>
                        <div class="fs-2 fw-bold text-success" th:text="${countSemaine}">0</div>
                        <div class="text-muted small">RDV cette semaine</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 shadow-sm">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="rounded-circle bg-warning bg-opacity-10 p-3">
                        <i class="bi bi-hourglass-split fs-3 text-warning"></i>
                    </div>
                    <div>
                        <div class="fs-2 fw-bold text-warning" th:text="${countAttente}">0</div>
                        <div class="text-muted small">Patients en attente</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- RDV du jour -->
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-header bg-white border-bottom d-flex justify-content-between align-items-center">
            <h5 class="mb-0"><i class="bi bi-clock me-2 text-primary"></i>Rendez-vous du jour</h5>
            <a th:href="@{/rendez-vous/nouveau}" class="btn btn-sm btn-primary">
                <i class="bi bi-plus me-1"></i>Nouveau RDV
            </a>
        </div>
        <div class="card-body p-0">
            <div th:if="${rdvJour.empty}" class="p-4 text-center text-muted">
                <i class="bi bi-calendar-x fs-3"></i>
                <p class="mt-2 mb-0">Aucun rendez-vous aujourd'hui</p>
            </div>
            <div th:unless="${rdvJour.empty}" class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>Heure</th><th>Patient</th><th>Médecin</th><th>Motif</th><th>Statut</th><th></th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="rdv : ${rdvJour}">
                        <td class="fw-semibold" th:text="${#temporals.format(rdv.dateHeure, 'HH:mm')}"></td>
                        <td>
                            <a th:href="@{/patients/{id}(id=${rdv.patient.id})}"
                               th:text="${rdv.patient.prenom + ' ' + rdv.patient.nom}"></a>
                        </td>
                        <td th:text="${'Dr. ' + rdv.medecin.prenom + ' ' + rdv.medecin.nom}"></td>
                        <td th:text="${rdv.motif ?: '—'}"></td>
                        <td>
                            <span th:class="${'badge badge-' + #strings.toLowerCase(rdv.statut.name())}"
                                  th:text="${rdv.statut}"></span>
                        </td>
                        <td>
                            <a th:href="@{/rendez-vous/{id}(id=${rdv.id})}" class="btn btn-sm btn-outline-secondary">
                                <i class="bi bi-eye"></i>
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Patients en attente -->
    <div class="card border-0 shadow-sm">
        <div class="card-header bg-white border-bottom">
            <h5 class="mb-0"><i class="bi bi-hourglass me-2 text-warning"></i>Patients en attente (statut PLANIFIÉ)</h5>
        </div>
        <div class="card-body p-0">
            <div th:if="${enAttente.empty}" class="p-4 text-center text-muted">
                <i class="bi bi-check-circle fs-3 text-success"></i>
                <p class="mt-2 mb-0">Aucun patient en attente</p>
            </div>
            <div th:unless="${enAttente.empty}" class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                    <tr><th>Date/Heure</th><th>Patient</th><th>Médecin</th><th>Motif</th><th></th></tr>
                    </thead>
                    <tbody>
                    <tr th:each="rdv : ${enAttente}">
                        <td th:text="${#temporals.format(rdv.dateHeure, 'dd/MM/yyyy HH:mm')}"></td>
                        <td>
                            <a th:href="@{/patients/{id}(id=${rdv.patient.id})}"
                               th:text="${rdv.patient.prenom + ' ' + rdv.patient.nom}"></a>
                        </td>
                        <td th:text="${'Dr. ' + rdv.medecin.prenom + ' ' + rdv.medecin.nom}"></td>
                        <td th:text="${rdv.motif ?: '—'}"></td>
                        <td>
                            <a th:href="@{/rendez-vous/{id}(id=${rdv.id})}" class="btn btn-sm btn-outline-primary">
                                <i class="bi bi-arrow-right"></i>
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
