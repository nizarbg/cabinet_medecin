<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/main}">
<head><title>Détail Rendez-vous</title></head>
<body>
<div layout:fragment="content">
    <div class="d-flex align-items-center gap-2 mb-4">
        <a th:href="@{/rendez-vous}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i></a>
        <h2 class="fw-bold mb-0">Détail du rendez-vous</h2>
        <div class="ms-auto d-flex gap-2">
            <a th:if="${rdv.statut.name() != 'ANNULE' and rdv.statut.name() != 'TERMINE'}"
               th:href="@{/rendez-vous/{id}/modifier(id=${rdv.id})}" class="btn btn-warning btn-sm">
                <i class="bi bi-pencil me-1"></i>Modifier
            </a>
            <form th:if="${rdv.statut.name() != 'ANNULE'}"
                  th:action="@{/rendez-vous/{id}/annuler(id=${rdv.id})}" method="post"
                  onsubmit="return confirm('Annuler ce rendez-vous ?')">
                <button type="submit" class="btn btn-danger btn-sm">
                    <i class="bi bi-x-circle me-1"></i>Annuler
                </button>
            </form>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white"><h6 class="mb-0 fw-semibold">Informations</h6></div>
                <div class="card-body">
                    <dl class="row mb-0">
                        <dt class="col-sm-5 text-muted">Patient</dt>
                        <dd class="col-sm-7">
                            <a th:href="@{/patients/{id}(id=${rdv.patient.id})}"
                               th:text="${rdv.patient.prenom + ' ' + rdv.patient.nom}"></a>
                        </dd>
                        <dt class="col-sm-5 text-muted">Médecin</dt>
                        <dd class="col-sm-7">
                            <a th:href="@{/medecins/{id}(id=${rdv.medecin.id})}"
                               th:text="${'Dr. ' + rdv.medecin.prenom + ' ' + rdv.medecin.nom}"></a>
                        </dd>
                        <dt class="col-sm-5 text-muted">Date/Heure</dt>
                        <dd class="col-sm-7 fw-semibold" th:text="${#temporals.format(rdv.dateHeure, 'dd/MM/yyyy HH:mm')}"></dd>
                        <dt class="col-sm-5 text-muted">Durée</dt>
                        <dd class="col-sm-7" th:text="${rdv.dureeMinutes + ' minutes'}"></dd>
                        <dt class="col-sm-5 text-muted">Motif</dt>
                        <dd class="col-sm-7" th:text="${rdv.motif ?: '—'}"></dd>
                        <dt class="col-sm-5 text-muted">Statut</dt>
                        <dd class="col-sm-7">
                            <span th:class="${'badge badge-' + #strings.toLowerCase(rdv.statut.name())}"
                                  th:text="${rdv.statut}"></span>
                        </dd>
                    </dl>
                    <!-- Changer statut -->
                    <div class="mt-3" sec:authorize="hasAnyRole('ADMIN','MEDECIN')">
                        <form th:action="@{/rendez-vous/{id}/statut(id=${rdv.id})}" method="post" class="d-flex gap-2">
                            <select name="statut" class="form-select form-select-sm">
                                <option value="PLANIFIE" th:selected="${rdv.statut.name() == 'PLANIFIE'}">PLANIFIÉ</option>
                                <option value="CONFIRME" th:selected="${rdv.statut.name() == 'CONFIRME'}">CONFIRMÉ</option>
                                <option value="TERMINE" th:selected="${rdv.statut.name() == 'TERMINE'}">TERMINÉ</option>
                                <option value="ANNULE" th:selected="${rdv.statut.name() == 'ANNULE'}">ANNULÉ</option>
                            </select>
                            <button type="submit" class="btn btn-sm btn-outline-primary">Mettre à jour</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- Ordonnance -->
        <div class="col-md-6">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white d-flex justify-content-between align-items-center">
                    <h6 class="mb-0 fw-semibold"><i class="bi bi-file-medical me-2"></i>Ordonnance</h6>
                    <a sec:authorize="hasAnyRole('ADMIN','MEDECIN')"
                       th:if="${rdv.ordonnance == null and rdv.statut.name() != 'ANNULE'}"
                       th:href="@{/ordonnances/nouveau(rdvId=${rdv.id})}"
                       class="btn btn-primary btn-sm">
                        <i class="bi bi-plus me-1"></i>Créer
                    </a>
                </div>
                <div class="card-body">
                    <div th:if="${rdv.ordonnance == null}" class="text-center text-muted py-3">
                        <i class="bi bi-file-earmark-x fs-3"></i>
                        <p class="mt-2 mb-0">Pas d'ordonnance pour ce RDV</p>
                    </div>
                    <div th:unless="${rdv.ordonnance == null}">
                        <p class="small text-muted mb-2">
                            Émise le <strong th:text="${#temporals.format(rdv.ordonnance.dateEmission, 'dd/MM/yyyy')}"></strong>
                        </p>
                        <ul class="list-unstyled">
                            <li th:each="ligne : ${rdv.ordonnance.medicaments}" class="mb-1">
                                <i class="bi bi-capsule me-1 text-success"></i>
                                <strong th:text="${ligne.nomMedicament}"></strong>
                                <span th:if="${ligne.posologie}" class="text-muted small"> — <span th:text="${ligne.posologie}"></span></span>
                            </li>
                        </ul>
                        <div class="mt-3 d-flex gap-2">
                            <a th:href="@{/ordonnances/{id}(id=${rdv.ordonnance.id})}"
                               class="btn btn-sm btn-outline-success">
                                <i class="bi bi-eye me-1"></i>Voir
                            </a>
                            <a th:href="@{/ordonnances/{id}/pdf(id=${rdv.ordonnance.id})}"
                               class="btn btn-sm btn-outline-danger">
                                <i class="bi bi-file-pdf me-1"></i>PDF
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
