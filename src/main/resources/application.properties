# =============================================
# Application name
# =============================================
spring.application.name=cabinet-medical

# =============================================
# DataSource — connexion MySQL 8
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/cabinet_medical?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# JPA / Hibernate
# ddl-auto=validate : Flyway gère le schéma, Hibernate valide seulement
# =============================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =============================================
# Flyway — migrations automatiques au démarrage
# =============================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# =============================================
# Thymeleaf — désactiver le cache en développement
# =============================================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# =============================================
# Serveur — port de l'application
# =============================================
server.port=8080

# =============================================
# Logging — niveau de log pour le débogage
# =============================================
logging.level.com.fst.cabinet=DEBUG
logging.level.org.springframework.security=INFO
