<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title layout:title-pattern="$CONTENT_TITLE — Cabinet Médical">Cabinet Médical</title>
    <!-- Bootstrap 5 -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background-color: #1a3c5e; }
        .sidebar .nav-link { color: #adb5bd; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { color: #fff; background-color: rgba(255,255,255,0.1); border-radius: 6px; }
        .sidebar .nav-link i { width: 20px; }
        .sidebar-brand { color: #fff; font-size: 1.1rem; }
        .badge-planifie  { background-color: #0d6efd; }
        .badge-confirme  { background-color: #198754; }
        .badge-annule    { background-color: #dc3545; }
        .badge-termine   { background-color: #6c757d; }
        .main-content { padding: 2rem; }
    </style>
    <th:block layout:fragment="head"></th:block>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <nav class="col-md-2 col-lg-2 d-md-block sidebar py-3 px-2">
            <div class="text-center mb-4">
                <i class="bi bi-hospital fs-2 text-white"></i>
                <div class="sidebar-brand fw-bold mt-1">Cabinet Médical</div>
            </div>
            <ul class="nav flex-column gap-1">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/dashboard}" th:classappend="${#httpServletRequest.requestURI == '/dashboard' ? 'active' : ''}">
                        <i class="bi bi-speedometer2 me-2"></i>Tableau de bord
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/patients}" th:classappend="${#strings.startsWith(#httpServletRequest.requestURI, '/patients') ? 'active' : ''}">
                        <i class="bi bi-people me-2"></i>Patients
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/medecins}" th:classappend="${#strings.startsWith(#httpServletRequest.requestURI, '/medecins') ? 'active' : ''}">
                        <i class="bi bi-person-badge me-2"></i>Médecins
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/rendez-vous}" th:classappend="${#strings.startsWith(#httpServletRequest.requestURI, '/rendez-vous') ? 'active' : ''}">
                        <i class="bi bi-calendar-check me-2"></i>Rendez-vous
                    </a>
                </li>
            </ul>
            <hr class="text-secondary"/>
            <ul class="nav flex-column">
                <li class="nav-item">
                    <span class="nav-link text-secondary small">
                        <i class="bi bi-person-circle me-1"></i>
                        <span sec:authentication="name">Utilisateur</span>
                    </span>
                </li>
                <li class="nav-item">
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="nav-link btn btn-link text-danger p-0 ms-2">
                            <i class="bi bi-box-arrow-right me-1"></i>Déconnexion
                        </button>
                    </form>
                </li>
            </ul>
        </nav>

        <!-- Main content -->
        <main class="col-md-10 col-lg-10 ms-sm-auto main-content">
            <!-- Flash messages -->
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                <i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div layout:fragment="content">
                <!-- Page content here -->
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<th:block layout:fragment="scripts"></th:block>
</body>
</html>
