<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/main}">
<head><title>Détail Ordonnance</title></head>
<body>
<div layout:fragment="content">
    <div class="d-flex align-items-center gap-2 mb-4">
        <a th:href="@{/rendez-vous/{id}(id=${ordonnance.rendezVous.id})}"
           class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i></a>
        <h2 class="fw-bold mb-0"><i class="bi bi-file-medical me-2 text-success"></i>Ordonnance</h2>
        <div class="ms-auto d-flex gap-2">
            <a sec:authorize="hasAnyRole('ADMIN','MEDECIN')"
               th:href="@{/ordonnances/{id}/modifier(id=${ordonnance.id})}"
               class="btn btn-warning btn-sm"><i class="bi bi-pencil me-1"></i>Modifier</a>
            <a th:href="@{/ordonnances/{id}/pdf(id=${ordonnance.id})}"
               class="btn btn-danger btn-sm"><i class="bi bi-file-pdf me-1"></i>Télécharger PDF</a>
        </div>
    </div>

    <!-- En-tête cabinet -->
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body">
            <div class="row">
                <div class="col-md-6">
                    <h5 class="fw-bold text-primary"><i class="bi bi-hospital me-2"></i>Cabinet Médical — FST</h5>
                    <p class="text-muted small mb-0">Master STR 2025/2026</p>
                </div>
                <div class="col-md-6 text-end">
                    <p class="mb-1"><strong>Date d'émission :</strong>
                        <span th:text="${#temporals.format(ordonnance.dateEmission, 'dd/MM/yyyy')}"></span>
                    </p>
                    <p class="mb-0"><strong>N° Ordonnance :</strong> #<span th:text="${ordonnance.id}"></span></p>
                </div>
            </div>
            <hr/>
            <div class="row">
                <div class="col-md-6">
                    <p class="mb-1"><i class="bi bi-person-badge me-2 text-primary"></i>
                        <strong>Médecin :</strong>
                        Dr. <span th:text="${ordonnance.rendezVous.medecin.prenom + ' ' + ordonnance.rendezVous.medecin.nom}"></span>
                    </p>
                    <p class="mb-0 small text-muted ms-4"
                       th:text="${ordonnance.rendezVous.medecin.specialite}"></p>
                </div>
                <div class="col-md-6">
                    <p class="mb-1"><i class="bi bi-person me-2 text-info"></i>
                        <strong>Patient :</strong>
                        <a th:href="@{/patients/{id}(id=${ordonnance.rendezVous.patient.id})}"
                           th:text="${ordonnance.rendezVous.patient.prenom + ' ' + ordonnance.rendezVous.patient.nom}"></a>
                    </p>
                    <p class="mb-0 small text-muted ms-4">
                        CIN : <span th:text="${ordonnance.rendezVous.patient.cin}"></span>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- Médicaments -->
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-header bg-white">
            <h5 class="mb-0 fw-semibold"><i class="bi bi-capsule me-2 text-success"></i>Médicaments prescrits</h5>
        </div>
        <div class="card-body">
            <div th:if="${ordonnance.medicaments.empty}" class="text-muted">
                Aucun médicament prescrit.
            </div>
            <div th:each="ligne, iter : ${ordonnance.medicaments}" class="d-flex gap-3 align-items-start mb-3">
                <div class="rounded-circle bg-success bg-opacity-10 d-flex align-items-center justify-content-center flex-shrink-0"
                     style="width:36px;height:36px">
                    <span class="fw-bold text-success small" th:text="${iter.index + 1}"></span>
                </div>
                <div>
                    <div class="fw-semibold" th:text="${ligne.nomMedicament}"></div>
                    <div th:if="${ligne.posologie}" class="small text-muted">
                        <i class="bi bi-clock me-1"></i>Posologie : <span th:text="${ligne.posologie}"></span>
                    </div>
                    <div th:if="${ligne.duree}" class="small text-muted">
                        <i class="bi bi-calendar-range me-1"></i>Durée : <span th:text="${ligne.duree}"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Observations -->
    <div class="card border-0 shadow-sm" th:if="${ordonnance.observations}">
        <div class="card-header bg-white">
            <h5 class="mb-0 fw-semibold"><i class="bi bi-journal-text me-2 text-warning"></i>Observations</h5>
        </div>
        <div class="card-body">
            <p class="mb-0" th:text="${ordonnance.observations}"></p>
        </div>
    </div>
</div>
</body>
</html>
