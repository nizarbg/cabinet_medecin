<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/main}">
<head><title>Médecins</title></head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold"><i class="bi bi-person-badge me-2 text-primary"></i>Gestion des Médecins</h2>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/medecins/nouveau}" class="btn btn-primary">
            <i class="bi bi-plus-lg me-1"></i>Nouveau médecin
        </a>
    </div>

    <div class="row g-4">
        <div th:if="${medecins.empty}" class="col-12 text-center text-muted py-5">
            <i class="bi bi-person-x fs-1"></i>
            <p class="mt-2">Aucun médecin enregistré.</p>
        </div>
        <div class="col-md-4" th:each="m : ${medecins}">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body">
                    <div class="d-flex align-items-start gap-3">
                        <div class="rounded-circle bg-primary bg-opacity-10 d-flex align-items-center justify-content-center flex-shrink-0"
                             style="width:50px;height:50px">
                            <i class="bi bi-person-badge fs-4 text-primary"></i>
                        </div>
                        <div class="flex-grow-1">
                            <h6 class="fw-bold mb-0" th:text="${'Dr. ' + m.prenom + ' ' + m.nom}"></h6>
                            <span class="badge bg-info text-dark small" th:text="${m.specialite}"></span>
                            <div th:unless="${m.actif}" class="badge bg-danger small">Inactif</div>
                        </div>
                    </div>
                    <hr/>
                    <dl class="row mb-0 small">
                        <dt class="col-5 text-muted">N° Ordre</dt>
                        <dd class="col-7" th:text="${m.numeroOrdre}"></dd>
                        <dt class="col-5 text-muted">Téléphone</dt>
                        <dd class="col-7" th:text="${m.telephone ?: '—'}"></dd>
                        <dt class="col-5 text-muted">Horaires</dt>
                        <dd class="col-7" th:text="${m.horairesDisponibilite ?: '—'}"></dd>
                    </dl>
                    <div class="mt-3 d-flex gap-2">
                        <a th:href="@{/medecins/{id}(id=${m.id})}" class="btn btn-sm btn-outline-primary">
                            <i class="bi bi-eye me-1"></i>Détail
                        </a>
                        <a sec:authorize="hasRole('ADMIN')"
                           th:href="@{/medecins/{id}/modifier(id=${m.id})}"
                           class="btn btn-sm btn-outline-warning">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <form sec:authorize="hasRole('ADMIN')"
                              th:action="@{/medecins/{id}/supprimer(id=${m.id})}" method="post" class="d-inline"
                              onsubmit="return confirm('Supprimer ce médecin ?')">
                            <button type="submit" class="btn btn-sm btn-outline-danger">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
