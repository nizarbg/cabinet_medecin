<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Connexion — Cabinet Médical</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>
        body { background: linear-gradient(135deg, #1a3c5e 0%, #2e6da4 100%); min-height: 100vh; }
        .login-card { border-radius: 12px; border: none; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card login-card">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-hospital fs-1 text-primary"></i>
                        <h4 class="fw-bold mt-2">Cabinet Médical</h4>
                        <p class="text-muted small">FST — Master STR 2025/2026</p>
                    </div>

                    <div th:if="${param.error}" class="alert alert-danger">
                        <i class="bi bi-exclamation-triangle me-2"></i>Identifiants incorrects.
                    </div>
                    <div th:if="${param.logout}" class="alert alert-info">
                        <i class="bi bi-info-circle me-2"></i>Vous avez été déconnecté.
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label for="username" class="form-label fw-semibold">Nom d'utilisateur</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person"></i></span>
                                <input type="text" id="username" name="username" class="form-control"
                                       placeholder="Votre identifiant" required autofocus/>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label fw-semibold">Mot de passe</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                <input type="password" id="password" name="password" class="form-control"
                                       placeholder="Mot de passe" required/>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Se connecter
                        </button>
                    </form>

                    <div class="mt-4 p-3 bg-light rounded small text-muted">
                        <strong>Comptes de démonstration :</strong><br/>
                        admin / admin123 — secretaire / admin123 — medecin1 / admin123
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
